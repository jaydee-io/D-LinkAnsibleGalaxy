---
# Integration tests for the dgs1250_lldp_interfaces resource module.

- name: Disable LLDP on test interface (merged)
  jaydee_io.dlink_dgs1250.dgs1250_lldp_interfaces:
    config:
      - name: "{{ test_interface }}"
        transmit: false
        receive: false
    state: merged
  register: result

- name: Assert merged changed
  ansible.builtin.assert:
    that: result.changed
    quiet: true

- name: Re-apply same LLDP config (idempotency)
  jaydee_io.dlink_dgs1250.dgs1250_lldp_interfaces:
    config:
      - name: "{{ test_interface }}"
        transmit: false
        receive: false
    state: merged
  register: result

- name: Assert idempotency
  ansible.builtin.assert:
    that: not result.changed
    quiet: true

# --- Cleanup ---
- name: Reset LLDP to defaults on test interface
  jaydee_io.dlink_dgs1250.dgs1250_lldp_interfaces:
    config:
      - name: "{{ test_interface }}"
    state: deleted
