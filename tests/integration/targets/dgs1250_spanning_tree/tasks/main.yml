---
# Integration tests for the dgs1250_spanning_tree resource module.

- name: Configure STP on test interface (merged)
  jaydee_io.dlink_dgs1250.dgs1250_spanning_tree:
    config:
      - name: "{{ test_interface }}"
        portfast: true
        cost: 20000
    state: merged
  register: result

- name: Assert merged changed
  ansible.builtin.assert:
    that: result.changed
    quiet: true

- name: Re-apply same STP config (idempotency)
  jaydee_io.dlink_dgs1250.dgs1250_spanning_tree:
    config:
      - name: "{{ test_interface }}"
        portfast: true
        cost: 20000
    state: merged
  register: result

- name: Assert idempotency
  ansible.builtin.assert:
    that: not result.changed
    quiet: true

# --- Cleanup ---
- name: Reset STP on test interface
  jaydee_io.dlink_dgs1250.dgs1250_spanning_tree:
    config:
      - name: "{{ test_interface }}"
    state: deleted
