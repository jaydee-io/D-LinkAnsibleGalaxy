---
# --- Create VLANs ---
- name: Create VLANs
  jaydee_io.dlink_dgs1250.vlan:
    vlan_id: "{{ item.id }}"
  loop: "{{ vlan_setup_vlans }}"
  when: vlan_setup_vlans | length > 0

- name: Name VLANs
  jaydee_io.dlink_dgs1250.vlan_name:
    vlan_id: "{{ item.id }}"
    name: "{{ item.name }}"
  loop: "{{ vlan_setup_vlans }}"
  when:
    - vlan_setup_vlans | length > 0
    - item.name is defined

# --- Access ports ---
- name: Set access port mode
  jaydee_io.dlink_dgs1250.vlan_switchport_mode:
    interface: "{{ item.interface }}"
    mode: access
  loop: "{{ vlan_setup_access_ports }}"
  when: vlan_setup_access_ports | length > 0

- name: Assign access VLAN
  jaydee_io.dlink_dgs1250.vlan_switchport_access:
    interface: "{{ item.interface }}"
    vlan_id: "{{ item.vlan_id }}"
  loop: "{{ vlan_setup_access_ports }}"
  when: vlan_setup_access_ports | length > 0

# --- Trunk ports ---
- name: Set trunk port mode
  jaydee_io.dlink_dgs1250.vlan_switchport_mode:
    interface: "{{ item.interface }}"
    mode: trunk
  loop: "{{ vlan_setup_trunk_ports }}"
  when: vlan_setup_trunk_ports | length > 0

- name: Configure trunk allowed VLANs
  jaydee_io.dlink_dgs1250.vlan_switchport_trunk_allowed:
    interface: "{{ item.interface }}"
    action: add
    vlan_id: "{{ item.allowed_vlans }}"
  loop: "{{ vlan_setup_trunk_ports }}"
  when: vlan_setup_trunk_ports | length > 0

- name: Configure trunk native VLAN
  jaydee_io.dlink_dgs1250.vlan_switchport_trunk_native:
    interface: "{{ item.interface }}"
    vlan_id: "{{ item.native_vlan }}"
  loop: "{{ vlan_setup_trunk_ports }}"
  when:
    - vlan_setup_trunk_ports | length > 0
    - item.native_vlan is defined
