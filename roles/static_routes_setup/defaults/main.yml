---
# IPv4 static routes — list of dicts: {network_prefix, network_mask, next_hop, route_type}
# Example:
#   - { network_prefix: 10.0.0.0, network_mask: 255.255.255.0, next_hop: 192.168.1.1 }
#   - { network_prefix: 172.16.0.0, network_mask: 255.255.0.0, next_hop: 192.168.1.1, route_type: backup }
static_routes_setup_ipv4: []

# IPv6 static routes — list of dicts: {network_prefix, next_hop, route_type}
# Example:
#   - { network_prefix: "2001:db8::/32", next_hop: "fe80::1" }
static_routes_setup_ipv6: []

# Save running-config to startup-config after applying the role
static_routes_setup_save_config: false
