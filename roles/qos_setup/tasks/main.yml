---
# --- Per-port QoS trust ---
- name: Configure QoS trust mode on ports
  jaydee_io.dlink_dgs1250.mls_qos_trust:
    interface: "{{ item.interface }}"
    trust: "{{ item.trust }}"
  notify: save config
  loop: "{{ qos_setup_trust_ports }}"
  when: qos_setup_trust_ports | length > 0

# --- Per-port default CoS ---
- name: Set default CoS on ports
  jaydee_io.dlink_dgs1250.mls_qos_cos:
    interface: "{{ item.interface }}"
    cos_value: "{{ item.cos_value }}"
  notify: save config
  loop: "{{ qos_setup_cos_ports }}"
  when: qos_setup_cos_ports | length > 0

# --- Per-port scheduler ---
- name: Configure QoS scheduler on ports
  jaydee_io.dlink_dgs1250.mls_qos_scheduler:
    interface: "{{ item.interface }}"
    algorithm: "{{ item.algorithm }}"
  notify: save config
  loop: "{{ qos_setup_scheduler_ports }}"
  when: qos_setup_scheduler_ports | length > 0

# --- Class maps ---
- name: Create class maps
  jaydee_io.dlink_dgs1250.class_map:
    name: "{{ item.name }}"
    match_type: "{{ item.match_type | default(omit) }}"
  notify: save config
  loop: "{{ qos_setup_class_maps }}"
  when: qos_setup_class_maps | length > 0

- name: Add match criteria to class maps
  jaydee_io.dlink_dgs1250.class_map_match:
    class_map: "{{ item.0.name }}"
    criteria: "{{ item.1.criteria }}"
    value: "{{ item.1.value }}"
  notify: save config
  loop: "{{ qos_setup_class_maps | subelements('matches', skip_missing=True) }}"
  when: qos_setup_class_maps | length > 0

# --- Policy maps ---
- name: Create policy maps
  jaydee_io.dlink_dgs1250.policy_map:
    name: "{{ item.name }}"
  notify: save config
  loop: "{{ qos_setup_policy_maps }}"
  when: qos_setup_policy_maps | length > 0

- name: Attach classes to policy maps
  jaydee_io.dlink_dgs1250.policy_map_class:
    policy_map: "{{ item.0.name }}"
    class_name: "{{ item.1.class_name }}"
  notify: save config
  loop: "{{ qos_setup_policy_maps | subelements('classes', skip_missing=True) }}"
  when: qos_setup_policy_maps | length > 0

- name: Set QoS actions on policy map classes
  jaydee_io.dlink_dgs1250.policy_map_set:
    policy_map: "{{ item.0.name }}"
    class_name: "{{ item.1.class_name }}"
    action: "{{ item.1.set_action }}"
    value: "{{ item.1.set_value }}"
  notify: save config
  loop: "{{ qos_setup_policy_maps | subelements('classes', skip_missing=True) }}"
  when:
    - qos_setup_policy_maps | length > 0
    - item.1.set_action is defined

# --- Apply policy maps to interfaces ---
- name: Apply service policies to interfaces
  jaydee_io.dlink_dgs1250.service_policy:
    interface: "{{ item.interface }}"
    policy_name: "{{ item.policy_name }}"
  notify: save config
  loop: "{{ qos_setup_service_policies }}"
  when: qos_setup_service_policies | length > 0
