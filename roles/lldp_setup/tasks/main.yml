---
# --- Global LLDP settings ---
- name: Configure LLDP global state
  jaydee_io.dlink_dgs1250.lldp_run:
    state: "{{ lldp_setup_enabled }}"
  notify: Save config

- name: Configure LLDP TX interval
  jaydee_io.dlink_dgs1250.lldp_tx_interval:
    seconds: "{{ lldp_setup_tx_interval }}"
  notify: Save config
  when: lldp_setup_tx_interval is not none

- name: Configure LLDP hold multiplier
  jaydee_io.dlink_dgs1250.lldp_hold_multiplier:
    multiplier: "{{ lldp_setup_hold_multiplier }}"
  notify: Save config
  when: lldp_setup_hold_multiplier is not none

- name: Configure LLDP reinit delay
  jaydee_io.dlink_dgs1250.lldp_reinit:
    seconds: "{{ lldp_setup_reinit }}"
  notify: Save config
  when: lldp_setup_reinit is not none

- name: Configure LLDP TX delay
  jaydee_io.dlink_dgs1250.lldp_tx_delay:
    seconds: "{{ lldp_setup_tx_delay }}"
  notify: Save config
  when: lldp_setup_tx_delay is not none

- name: Configure LLDP fast count
  jaydee_io.dlink_dgs1250.lldp_fast_count:
    count: "{{ lldp_setup_fast_count }}"
  notify: Save config
  when: lldp_setup_fast_count is not none

- name: Configure LLDP notification
  jaydee_io.dlink_dgs1250.lldp_notification_enable:
    state: "{{ lldp_setup_notification }}"
  notify: Save config
  when: lldp_setup_notification is not none

- name: Configure LLDP SNMP traps
  jaydee_io.dlink_dgs1250.lldp_snmp_traps:
    state: "{{ lldp_setup_snmp_traps }}"
  notify: Save config
  when: lldp_setup_snmp_traps is not none

- name: Configure LLDP management address
  jaydee_io.dlink_dgs1250.lldp_management_address:
    address: "{{ lldp_setup_management_address }}"
  notify: Save config
  when: lldp_setup_management_address is not none

- name: Configure LLDP forwarding
  jaydee_io.dlink_dgs1250.lldp_forward:
    state: "{{ lldp_setup_forward }}"
  notify: Save config
  when: lldp_setup_forward is not none

- name: Configure LLDP TLV selection
  jaydee_io.dlink_dgs1250.lldp_tlv_select:
    tlv: "{{ lldp_setup_tlv_select }}"
  notify: Save config
  when: lldp_setup_tlv_select is not none

- name: Configure LLDP 802.1 TLV selection
  jaydee_io.dlink_dgs1250.lldp_dot1_tlv_select:
    tlv: "{{ lldp_setup_dot1_tlv_select }}"
  notify: Save config
  when: lldp_setup_dot1_tlv_select is not none

- name: Configure LLDP 802.3 TLV selection
  jaydee_io.dlink_dgs1250.lldp_dot3_tlv_select:
    tlv: "{{ lldp_setup_dot3_tlv_select }}"
  notify: Save config
  when: lldp_setup_dot3_tlv_select is not none

- name: Configure LLDP MED TLV selection
  jaydee_io.dlink_dgs1250.lldp_med_tlv_select:
    tlv: "{{ lldp_setup_med_tlv_select }}"
  notify: Save config
  when: lldp_setup_med_tlv_select is not none

- name: Configure LLDP subtype
  jaydee_io.dlink_dgs1250.lldp_subtype:
    subtype: "{{ lldp_setup_subtype }}"
  notify: Save config
  when: lldp_setup_subtype is not none

# --- Per-interface LLDP settings ---
- name: Configure LLDP transmit on interfaces
  jaydee_io.dlink_dgs1250.lldp_transmit:
    interface: "{{ item.interface }}"
    state: "{{ item.transmit | ternary('enabled', 'disabled') }}"
  notify: Save config
  loop: "{{ lldp_setup_interfaces }}"
  when: item.transmit is defined

- name: Configure LLDP receive on interfaces
  jaydee_io.dlink_dgs1250.lldp_receive:
    interface: "{{ item.interface }}"
    state: "{{ item.receive | ternary('enabled', 'disabled') }}"
  notify: Save config
  loop: "{{ lldp_setup_interfaces }}"
  when: item.receive is defined
